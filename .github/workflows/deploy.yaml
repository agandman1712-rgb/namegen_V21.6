name: EKS Namegen Cloud Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main 

jobs:
  devops-pipeline:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    # ==========================================
    # חלק א': טראפורם - ירוץ אך ורק בלחיצה ידנית!
    # ==========================================
    - name: Setup Terraform
      if: github.event_name == 'workflow_dispatch'
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      if: github.event_name == 'workflow_dispatch'
      run: terraform init
      working-directory: ./terraform

    - name: Terraform Apply
      if: github.event_name == 'workflow_dispatch'
      run: terraform apply -auto-approve
      working-directory: ./terraform

    # ==========================================
    # חלק ב': בדיקת קיום הקלאסטר בענן
    # ==========================================
    - name: Check if EKS Cluster Exists
      id: check_cluster
      run: |
        if aws eks describe-cluster --name namegen-cluster --region us-east-1 >/dev/null 2>&1; then
          echo "cluster_exists=true" >> $GITHUB_OUTPUT
          echo "קלאסטר נמצא פעיל בענן. ממשיכים בפריסה האפליקציה."
        else
          echo "cluster_exists=false" >> $GITHUB_OUTPUT
          echo "קלאסטר לא נמצא. הענן כבוי כרגע. ה-Pipeline יעצור כאן בצורה נקייה."
        fi

    # ==========================================
    # חלק ג': בנייה ופריסה - ירוץ רק אם הקלאסטר קיים באוויר!
    # ==========================================
    - name: Login to Docker Hub
      if: steps.check_cluster.outputs.cluster_exists == 'true'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      if: steps.check_cluster.outputs.cluster_exists == 'true'
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/namegen:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/namegen:${{ github.sha }}

    - name: Update Kubeconfig for EKS
      if: steps.check_cluster.outputs.cluster_exists == 'true'
      run: |
        aws configure set default.region us-east-1
        aws eks update-kubeconfig --name namegen-cluster --region us-east-1

    - name: Update Kubernetes Manifest
      if: steps.check_cluster.outputs.cluster_exists == 'true'
      run: |
        sed -i 's|image: .*|image: '${{ secrets.DOCKERHUB_USERNAME }}'/namegen:'${{ github.sha }}'|g' kubernetes/app-and-db.yaml
        sed -i 's|MONGODB_PASSWORD_PLACEHOLDER|'${{ secrets.MONGODB_PASSWORD }}'|g' kubernetes/app-and-db.yaml

    - name: Deploy to EKS Cloud
      if: steps.check_cluster.outputs.cluster_exists == 'true'
      run: |
        kubectl apply -f kubernetes/
