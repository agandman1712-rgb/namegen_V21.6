name: EKS Namegen Cloud Deploy

on:
  push:
    branches:
      - main

jobs:
  terraform-infra:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init
      working-directory: ./terraform

    - name: Terraform Apply
      run: terraform apply -auto-approve
      working-directory: ./terraform

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: terraform-infra 
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/namegen:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/namegen:${{ github.sha }}

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Update Kubeconfig for EKS
      run: |
        aws eks update-kubeconfig --name namegen-cluster --region us-east-1

    - name: Update Kubernetes Manifest
      run: |
        sed -i 's|image: .*|image: '${{ secrets.DOCKERHUB_USERNAME }}'/namegen:'${{ github.sha }}'|g' kubernetes/deployment.yaml

    - name: Deploy to EKS Cloud
      run: |
        kubectl apply -f kubernetes/
