name: EKS Namegen Deploy

on:
  push:
    branches:
      - main 
  workflow_dispatch:
    inputs:
      action:
        description: 'בחר הפעיל את הסביבה או מחוק את הרכיבים היקרים'
        required: true
        default: 'Apply'
        type: choice
        options:
          - 'Apply'
          - 'Destroy_EKS'

jobs:
  devops-pipeline:
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials for Terraform
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    # ==========================================
    # הרצת ידנית 
    # ==========================================
    - name: Setup Terraform
      if: github.event_name == 'workflow_dispatch'
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      if: github.event_name == 'workflow_dispatch'
      run: terraform init
      working-directory: ./terraform

    - name: Terraform Apply
      if: github.event_name == 'workflow_dispatch'
      run: terraform apply -auto-approve
      working-directory: ./terraform

    # ==========================================
    # בדיקת הקלאסטר בענן - אם קיים
    # ==========================================
    - name: Check if EKS Cluster Exists
      id: check_cluster
      run: |
        if aws eks describe-cluster --name namegen-cluster --region us-east-1 >/dev/null 2>&1; then
          echo "cluster_exists=true" >> $GITHUB_OUTPUT
          echo "קלאסטר נמצא פעיל בענן. ממשיכים בפריסה האפליקציה."
        else
          echo "cluster_exists=false" >> $GITHUB_OUTPUT
          echo "קלאסטר לא נמצא. הענן כבוי כרגע. ה-Pipeline יעצור כאן בצורה נקייה."
        fi

    # ==========================================
    #  בנייה ופריסה - ירוץ רק אם הקלאסטר קיים באוויר
    # ==========================================
    - name: Login to Amazon ECR
      if: steps.check_cluster.outputs.cluster_exists == 'true'
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and Push Docker Image
      if: steps.check_cluster.outputs.cluster_exists == 'true'
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: namegen-app 
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

    - name: Update Kubeconfig for EKS
      if: steps.check_cluster.outputs.cluster_exists == 'true'
      run: |
        aws configure set default.region us-east-1
        aws eks update-kubeconfig --name namegen-cluster --region us-east-1

    - name: Update Kubernetes Manifest
      if: steps.check_cluster.outputs.cluster_exists == 'true'
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        sed -i "s|YOUR_DOCKERHUB_USERNAME/namegen:latest|${{ env.ECR_REGISTRY }}/namegen-app:${{ github.sha }}|g" kubernetes/app-and-db.yaml
        sed -i 's|MONGODB_PASSWORD_PLACEHOLDER|'${{ secrets.MONGODB_PASSWORD }}'|g' kubernetes/app-and-db.yaml

    - name: Deploy to EKS Cloud
      if: steps.check_cluster.outputs.cluster_exists == 'true'
      run: |
        kubectl apply -f kubernetes/app-and-db.yaml
        
        echo "מחכים 25 שניות לקבלת הקישור מה-NLB..."
        sleep 25
        
        echo "=== הקישור הסופי לאתר שלך הוא: ==="
        kubectl get svc namegen-service -o jsonpath='{.status.loadBalancer.ingress[*].hostname}'
        echo ""
