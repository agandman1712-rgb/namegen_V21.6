name: EKS Namegen Cloud Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main 

jobs:
  terraform-infra:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' 
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Terraform Apply
      run: terraform apply -auto-approve
      working-directory: ./terraform

  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Update Kubeconfig for EKS
      run: |
        aws eks update-kubeconfig --name namegen-cluster --region us-east-1

    - name: Update Kubernetes Manifest
      run: |
        sed -i 's|image: .*|image: '${{ secrets.DOCKERHUB_USERNAME }}'/namegen:'${{ github.sha }}'|g' kubernetes/deployment.yaml

    - name: Deploy to EKS Cloud
      run: |
        kubectl apply -f kubernetes/
